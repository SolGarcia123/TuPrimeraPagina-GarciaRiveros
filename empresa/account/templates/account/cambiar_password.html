{% extends "ventas/base.html" %}

{% block contenido %}

<h2 style="text-align:center;">CAMBIAR CONTRASEÑA</h2>

<div style="display:flex; justify-content:center;">

    <form method="POST" style="
        background-color: #ccc;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
    ">
        {% csrf_token %}

        {% if form.errors %}
            <div style="color:red; margin-bottom:10px;">
                {{ form.errors }}
            </div>
        {% endif %}

        <div style="margin-bottom: 15px;">
            <label><strong>Contraseña actual:</strong></label><br>
            {{ form.old_password }}
        </div>

        <div style="margin-bottom: 15px;">
            <label><strong>Nueva contraseña:</strong></label><br>
            {{ form.new_password1 }}
        </div>

        <div style="margin-bottom: 15px;">
            <label><strong>Confirmar nueva contraseña:</strong></label><br>
            {{ form.new_password2 }}
        </div>

        <button type="submit" style="
            background-color: #8B5CF6;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
        ">
            GUARDAR CAMBIOS
        </button>

    </form>

</div>

<div style="
    width: 400px;
    margin: 20px auto 0 auto;
    text-align: left;
">

    <a href="{% url 'editar_perfil' %}" style="
        background-color: #8B5CF6;
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        text-transform: uppercase;
        text-decoration: none;
        display: inline-block;
        font-size: 14px;
    ">
        VOLVER
    </a>

</div>


{% endblock %}
