{% extends "base.html" %}

{% block contenido %}

<h2>Buscar Cliente</h2>

<form method="GET">
    <input type="text" name="nombre" placeholder="Buscar por nombre">
    <button type="submit">Buscar</button>
</form>

<ul>
    {% for c in clientes %}
        <li>{{ c.nombre }} - {{ c.email }}</li>
    {% endfor %}
</ul>

{% endblock %}
