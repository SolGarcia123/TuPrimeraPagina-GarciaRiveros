{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>ROMBO PISOS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-image: url("{% static 'ventas/img/fondo.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }


        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px;
        }


        .logo img {
            height: 50px;
        }


        .menu a {
            margin-left: 15px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }


        .contenido {
            margin: 20px auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            width: fit-content;
            min-width: 300px;
            max-width: 850px;
        }

        button {
            background-color: #4da6ff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:focus {
            outline: none;
            box-shadow: none;
        }

        h1 {
            color: black;
        }

        h3 {
            color: #800080;
        }

        input, select, textarea {
            border-radius: 8px;
            padding: 8px;
            border: 1px solid #ccc;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border: 1px solid #4da6ff;
            box-shadow: 0 0 5px rgba(77,166,255,0.5);
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">
            <img src="{% static 'ventas/img/logo.jpg' %}" alt="Rombo Pisos">
        </div>

        <div class="menu">
            <a href="/">🏠 INICIO</a>
            <a href="/about/">ℹ️ ABOUT US</a>

            {% if user.is_authenticated %}
                <a href="/account/perfil/">👤 PERFIL</a>
                <a href="/crear-proveedor/">🏢 PROVEEDORES</a>
                <a href="/cliente/">🧑‍💼 CLIENTES</a>
                <a href="{% url 'productos' %}">🧱 BALDOSAS</a>
                <a href="/account/logout/">🔓 CERRAR SESIÓN</a>
            {% endif %}
        </div>
    </div>

    <div class="contenido">
        {% block contenido %}
        {% endblock %}
    </div>

</body>
</html>
