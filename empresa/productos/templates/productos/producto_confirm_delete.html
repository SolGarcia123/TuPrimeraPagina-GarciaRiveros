{% extends "ventas/base.html" %}

{% block contenido %}

<h2 style="margin-bottom: 20px;">🗑️ ELIMINAR DISEÑO</h2>

<div style="
    border: 1px solid #ddd;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
">

    <p><strong>¿Deseas eliminar el diseño seleccionado?</strong></p>

    <p><strong>Codigo:</strong> {{ object.codigo}}</p>
    <p><strong>Nombre:</strong> {{ object.nombre}}</p>
    <p><strong>Precio:</strong> {{ object.precio}}</p>
    <p><strong>Color:</strong> {{ object.color}}</p>
    
</div>


<div style="margin-top: 20px;">

    <form method="POST">
      {% csrf_token %}
      <button type="submit" style="
          background-color: #8B5CF6;
          color: white;
          padding: 10px 20px;
          border-radius: 5px;
          border: none;
          cursor: pointer;
          text-transform: uppercase;
          width: 100px;
          display: block;
          margin-bottom: 10px;
      ">
        ELIMINAR
      </button>
    </form>

    <a href="{% url 'buscar_producto' %}?nombre={{ nombre }}">
      <button style="
          background-color: #8B5CF6;
          color: white;
          padding: 10px 20px;
          border-radius: 5px;
          border: none;
          cursor: pointer;
          text-transform: uppercase;
          width: 100px;
      ">
        VOLVER
      </button>
    </a>

</div>

{% endblock %}
