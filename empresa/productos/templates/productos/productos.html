{% extends "ventas/base.html" %}

{% block contenido %}

<h1 style="text-align: center;">DISEÑOS</h1>

<div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">

    <form action="{% url 'crear_producto' %}">
        <button type="submit" style="
            background-color: #8B5CF6;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: bold;
            border: none;
        ">
            Añadir Diseño
        </button>
    </form>

    <!-- Buscar -->
    <form action="{% url 'buscar_producto' %}">
        <button type="submit" style="
            background-color: #8B5CF6;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: bold;
            border: none;
        ">
            Buscar Diseño
        </button>
    </form>

</div>

<style>
button:hover {
    background-color: #7C3AED;
    cursor: pointer;
}
</style>

{% endblock %}
